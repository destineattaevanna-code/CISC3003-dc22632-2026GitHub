<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC226328 MA IAT TIM</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="page-wrap">
        <section class="auth-card" id="authCard">
            <div class="brand-side">
                <div class="brand-content">
                    <img src="images/website_7376495.png" alt="Website illustration" class="brand-image">
                    <h1>Welcome</h1>
                    <p>Create your account or sign in to continue.</p>

                    <div class="switch-buttons">
                        <button type="button" id="showSignInBtn" class="toggle-btn active-btn">
                            Sign In
                        </button>
                        <button type="button" id="showSignUpBtn" class="toggle-btn">
                            Sign Up
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-side">
                <!-- Sign In Form -->
                <form id="signInForm" class="form-panel active-form" action="#" method="post" novalidate>
                    <img src="images/unsecure_10399884.png" alt="Security icon" class="form-icon">

                    <h2>Sign In</h2>
                    <p class="subtitle">Login to your account</p>

                    <div class="input-group">
                        <label for="signin-email">Email</label>
                        <input type="email" id="signin-email" name="signin_email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="signin-password">Password</label>
                        <input type="password" id="signin-password" name="signin_password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="submit-btn">Sign In</button>

                    <p class="form-note">
                        No account?
                        <button type="button" class="inline-link" id="goToSignUp">Sign Up</button>
                    </p>
                </form>

                <!-- Sign Up Form -->
                <form id="signUpForm" class="form-panel" action="#" method="post" novalidate>
                    <img src="images/unsecure_10399884.png" alt="Security icon" class="form-icon">

                    <h2>Sign Up</h2>
                    <p class="subtitle">Create a new account</p>

                    <div class="input-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" name="signup_name" placeholder="Enter your full name">
                    </div>

                    <div class="input-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" name="signup_email" placeholder="Enter your email">
                    </div>

                    <div class="input-group">
                        <label for="signup-password">Create Password</label>
                        <input type="password" id="signup-password" name="signup_password" placeholder="Create your password">
                    </div>

                    <button type="submit" class="submit-btn">Sign Up</button>

                    <p class="form-note">
                        Already have an account?
                        <button type="button" class="inline-link" id="goToSignIn">Sign In</button>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        CISC3003 Web Programming: DC226328 MA IAT TIM 2026
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
